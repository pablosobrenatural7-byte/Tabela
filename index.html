<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela Sala do Futuro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="container-carrinho">
        <button id="btn-carrinho" onclick="toggleCarrinho()">
            🛒 <span id="contagem-carrinho">0</span>
        </button>
        <div id="janela-carrinho" class="escondido">
            <h3>Seu Carrinho</h3>
            <ul id="lista-carrinho"></ul>
            <div class="total">Total: R$ <span id="valor-total">0.00</span></div>
            <button onclick="finalizarPedido()" class="btn-primario">Finalizar Pedido</button>
        </div>
    </div>

    <header>
        <h1>Bem-vindo (a)</h1>
        <div id="user-info">
            </div>
    </header>

    <section id="auth-usuario" class="card-auth">
        <div class="tabs">
            <button class="tab-btn active" onclick="alternarAuth('login')">Login</button>
            <button class="tab-btn" onclick="alternarAuth('cadastro')">Cadastro</button>
        </div>

        <div id="form-login">
            <input type="text" id="u-login-num" placeholder="Número (Ex: RA + Dígito)">
            <input type="password" id="u-login-pass" placeholder="Sua Senha">
            <button onclick="loginUsuario()" class="btn-primario">Entrar</button>
        </div>

        <div id="form-cadastro" class="escondido">
            <input type="text" id="u-cad-num" placeholder="RA + Dígito (Até 14 dígitos)">
            <input type="text" id="u-cad-nome" placeholder="Seu Nome (3 a 20 carac.)">
            <input type="password" id="u-cad-pass" placeholder="Senha (8 a 15 carac.)">
            <button onclick="cadastrarUsuario()" class="btn-primario">Criar Conta</button>
        </div>
        <p id="auth-msg" style="margin-top: 10px; font-size: 0.9rem;"></p>
    </section>

    <main id="area-publica" class="escondido">
        <table id="tabela-precos">
            <thead>
                <tr>
                    <th>Serviço / Produto</th>
                    <th>Preço (R$)</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody id="corpo-tabela-publica"></tbody>
        </table>
    </main>
    <p>
    Feito por HChico</p><p>
    Contato: (18) 98104-8815
    </p>
    <script src="index.js"></script>
</body>
</html>
